<!doctype html>
<html lang="ko" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>할일 목록 (Todo List)</title>
    <link rel="icon" href="img/favicon.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/dashboard.tailwind.css" />
    <link rel="stylesheet" href="css/icons.css" />
    <link rel="stylesheet" href="css/calendar.css" />
  </head>
  <body class="bg-slate-50 font-sans text-slate-900 overflow-hidden h-full flex m-0">
    <div class="flex h-full w-full overflow-hidden">
      <!-- Sidebar -->
      <aside
        id="sidebar"
        class="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0 z-10 hidden lg:flex"
      >
        <a
          href="dashboard.html"
          class="p-6 flex items-center space-x-3 hover:bg-slate-50 transition-colors"
          style="text-decoration: none"
          aria-label="대시보드로 이동"
        >
          <img
            src="img/logo.png"
            alt="TaskMaster"
            class="w-8 h-8 shrink-0 object-contain"
            width="32"
            height="32"
          />
          <span class="font-bold text-lg tracking-tight text-slate-900">TaskMaster</span>
        </a>

        <nav class="flex-1 px-4 space-y-1" id="filter-nav">
          <button
            class="filter-btn w-full flex items-center justify-between px-3 py-2 bg-indigo-50 text-indigo-700 rounded-lg font-medium transition-colors"
            data-filter="all"
          >
            <div class="flex items-center">
              <span class="material-symbols-outlined w-5 h-5 mr-3 text-[20px]">dashboard</span>전체
            </div>
          </button>
          <button
            class="filter-btn w-full flex items-center justify-between px-3 py-2 text-slate-600 hover:bg-slate-50 rounded-lg transition-colors font-medium"
            data-filter="today"
          >
            <div class="flex items-center">
              <span class="material-symbols-outlined w-5 h-5 mr-3 text-[20px]">today</span>오늘
            </div>
            <span
              class="text-xs font-semibold bg-slate-100 px-2 py-0.5 rounded-full text-slate-500"
              id="nav-badge-today"
              >0</span
            >
          </button>
          <button
            class="filter-btn w-full flex items-center justify-between px-3 py-2 text-slate-600 hover:bg-slate-50 rounded-lg transition-colors font-medium"
            data-filter="upcoming"
          >
            <div class="flex items-center text-orange-600">
              <span class="material-symbols-outlined w-5 h-5 mr-3 text-[20px]">event_upcoming</span>예정
            </div>
          </button>
          <button
            class="filter-btn w-full flex items-center justify-between px-3 py-2 text-slate-600 hover:bg-slate-50 rounded-lg transition-colors font-medium"
            data-filter="important"
          >
            <div class="flex items-center text-red-500">
              <span class="material-symbols-outlined w-5 h-5 mr-3 text-[20px]">priority_high</span>중요
            </div>
          </button>
          <button
            class="filter-btn w-full flex items-center justify-between px-3 py-2 text-slate-600 hover:bg-slate-50 rounded-lg transition-colors font-medium"
            data-filter="completed"
          >
            <div class="flex items-center text-emerald-500">
              <span class="material-symbols-outlined w-5 h-5 mr-3 text-[20px]">done_all</span>완료
            </div>
          </button>

          <div class="pt-8 pb-2 px-3">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Projects</span>
          </div>
          <button
            type="button"
            class="category-btn w-full flex items-center px-3 py-2 text-slate-600 hover:bg-slate-50 rounded-lg font-medium transition-colors"
            data-category="work"
          >
            <span class="w-2 h-2 rounded-full bg-blue-500 mr-4"></span> 업무
          </button>
          <button
            type="button"
            class="category-btn w-full flex items-center px-3 py-2 text-slate-600 hover:bg-slate-50 rounded-lg font-medium transition-colors"
            data-category="personal"
          >
            <span class="w-2 h-2 rounded-full bg-emerald-500 mr-4"></span> 개인
          </button>
          <button
            type="button"
            class="category-btn w-full flex items-center px-3 py-2 text-slate-600 hover:bg-slate-50 rounded-lg font-medium transition-colors"
            data-category="study"
          >
            <span class="w-2 h-2 rounded-full bg-amber-500 mr-4"></span> 공부
          </button>
        </nav>

        <div class="p-4 border-t border-slate-200">
          <div class="flex items-center space-x-3 bg-slate-50 p-2 rounded-xl">
            <div
              class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center font-bold text-indigo-700 shrink-0"
            >
              ME
            </div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-slate-900 truncate">관리자</p>
              <p class="text-xs text-slate-500 truncate">Administrator</p>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col bg-white overflow-hidden min-w-0 relative">
        <header
          class="h-16 border-b border-slate-200 px-4 lg:px-8 flex items-center justify-between shrink-0 bg-white"
        >
          <div class="flex items-center gap-3 lg:gap-4 min-w-0">
            <button
              type="button"
              id="menu-btn"
              class="lg:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-lg shrink-0"
              aria-label="메뉴"
              aria-expanded="false"
              aria-controls="sidebar"
            >
              <span class="material-symbols-outlined">menu</span>
            </button>
            <h1 class="text-lg lg:text-xl font-bold text-slate-800 truncate">My Dashboard</h1>
          </div>

          <div class="flex items-center space-x-3 lg:space-x-4 shrink-0">
            <span id="connection-status" class="hidden lg:flex items-center text-xs font-medium px-2.5 py-1 rounded-full bg-slate-100 border border-slate-200 text-slate-600" title="연결 상태">
              <span class="inline-block w-2 h-2 rounded-full bg-slate-400 mr-1.5"></span>연결 중…
            </span>
            <div class="relative hidden lg:block">
              <input
                type="text"
                id="search-input"
                placeholder="Quick search..."
                class="bg-slate-100 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-full py-1.5 pl-10 pr-4 text-sm w-48 lg:w-64 transition-all outline-none"
              />
              <span
                class="material-symbols-outlined text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 text-[18px] pointer-events-none"
                >search</span
              >
            </div>
            <button
              type="button"
              id="add-btn"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 lg:px-4 py-1.5 rounded-lg text-sm font-semibold flex items-center transition-colors shadow-sm whitespace-nowrap"
            >
              <span class="material-symbols-outlined w-4 h-4 mr-1 text-[18px]">add</span>
              New Task
            </button>
          </div>
        </header>

        <div class="flex-1 min-h-0 p-4 lg:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 overflow-hidden">
          <div class="lg:col-span-8 flex flex-col min-h-0">
            <div class="flex items-center justify-between mb-6 shrink-0">
              <h2 class="text-base font-bold text-slate-800">진행중인 할 일</h2>
              <div class="flex bg-slate-100 p-1 rounded-lg">
                <button
                  type="button"
                  id="view-list-btn"
                  class="px-3 py-1.5 text-xs font-semibold bg-white shadow-sm text-indigo-600 rounded-md transition-all"
                >
                  리스트
                </button>
                <button
                  type="button"
                  id="view-calendar-btn"
                  class="px-3 py-1.5 text-xs font-medium text-slate-500 hover:bg-slate-50 rounded-md transition-all"
                >
                  캘린더
                </button>
              </div>
            </div>

            <div id="task-panel-body" class="flex-1 min-h-0 flex flex-col overflow-hidden">
              <div id="list-scroll" class="flex-1 min-h-0 overflow-y-auto pr-1">
                <div id="list-view" class="space-y-3"></div>

                <div id="completed-view" class="pt-6 mt-4 opacity-70 hidden">
                  <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">
                    완료된 할 일
                  </h2>
                  <div id="completed-list" class="space-y-3"></div>
                </div>
              </div>

              <div id="calendar-view" class="hidden flex-1 min-h-0 flex flex-col">
                <div
                  class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden flex-1 min-h-0 flex flex-col"
                >
                  <div class="p-3 sm:p-4 border-b border-slate-100 flex flex-col gap-2 shrink-0">
                    <div class="relative flex items-center justify-center w-full min-h-[2.25rem]">
                      <div class="absolute left-0 z-10 flex items-center gap-2">
                        <button
                          type="button"
                          id="cal-prev"
                          class="p-1.5 bg-slate-50 rounded text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors shrink-0"
                        >
                          <span class="material-symbols-outlined text-[18px]">chevron_left</span>
                        </button>
                        <button
                          type="button"
                          id="cal-next"
                          class="p-1.5 bg-slate-50 rounded text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors shrink-0"
                        >
                          <span class="material-symbols-outlined text-[18px]">chevron_right</span>
                        </button>
                      </div>
                      <h2
                        id="calendar-title"
                        class="text-sm sm:text-base font-bold text-slate-800 text-center px-[4.75rem] min-w-0 max-w-full truncate"
                      ></h2>
                    </div>
                    <div id="cal-mode-tabs-scroll" class="w-full">
                      <div class="flex bg-slate-100 p-1 rounded-lg w-max mx-auto" id="cal-mode-tabs">
                        <button type="button" data-cal-mode="month" class="cal-mode-btn px-2 sm:px-2.5 py-1 text-xs font-medium text-slate-500 rounded transition-all">월간</button>
                        <button type="button" data-cal-mode="week" class="cal-mode-btn active px-2 sm:px-2.5 py-1 text-xs font-medium text-slate-500 rounded transition-all">주간</button>
                        <button type="button" data-cal-mode="day" class="cal-mode-btn px-2 sm:px-2.5 py-1 text-xs font-medium text-slate-500 rounded transition-all">일간</button>
                        <button type="button" data-cal-mode="timeline" class="cal-mode-btn px-2 sm:px-2.5 py-1 text-xs font-medium text-slate-500 rounded transition-all">타임라인</button>
                      </div>
                    </div>
                  </div>

                  <div id="calendar-scroll-wrap" class="flex-1 min-h-0">
                    <div id="calendar-scroll-inner" class="flex flex-col flex-1 min-h-0 h-full">
                      <div
                        id="week-day-headers"
                        class="border-b border-slate-100 text-center shrink-0"
                      ></div>
                      <div id="calendar-grid" class="relative flex-1 min-h-0"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="lg:col-span-4 space-y-6">
            <div class="bg-indigo-600 rounded-2xl p-6 text-white shadow-lg shadow-indigo-200/50">
              <p class="text-indigo-200 text-xs font-bold uppercase tracking-wider mb-2">진행률</p>
              <div class="flex items-end justify-between mb-4">
                <h3 class="text-3xl font-bold" id="stat-total-percent">0%</h3>
                <p class="text-sm opacity-90">
                  전체 <span id="stat-total">0</span>개 중 <span id="stat-completed">0</span>개 완료
                </p>
              </div>
              <div class="h-2 bg-indigo-500/50 rounded-full overflow-hidden backdrop-blur-sm">
                <div
                  id="stat-progress-bar"
                  class="h-full bg-white rounded-full transition-all duration-500 ease-out"
                  style="width: 0%"
                ></div>
              </div>
              <button
                type="button"
                id="stat-view-completed-btn"
                class="mt-6 w-full py-2.5 bg-indigo-500/40 hover:bg-indigo-500/60 border border-indigo-400/30 rounded-xl text-sm font-semibold transition-all"
              >
                완료 목록 보기
              </button>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <button
                type="button"
                data-filter="today"
                class="stat-card-btn bg-slate-50 border border-slate-200 rounded-2xl p-4 flex flex-col justify-center text-left transition-all hover:border-indigo-200"
              >
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">오늘 할 일</p>
                <p class="text-2xl font-bold text-slate-800" id="stat-today">0</p>
              </button>
              <button
                type="button"
                data-filter="important"
                class="stat-card-btn bg-slate-50 border border-slate-200 rounded-2xl p-4 flex flex-col justify-center text-left transition-all hover:border-indigo-200"
              >
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">중요</p>
                <p class="text-2xl font-bold text-slate-800" id="stat-important">0</p>
              </button>
              <button
                type="button"
                data-filter="deadline"
                class="stat-card-btn bg-slate-50 border border-slate-200 rounded-2xl p-4 flex flex-col justify-center text-left col-span-2 transition-all hover:border-red-200 group"
              >
                <p
                  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 group-hover:text-red-400 transition-colors"
                >
                  마감 임박
                </p>
                <p class="text-2xl font-bold text-red-500" id="stat-deadline">0</p>
              </button>
            </div>

            <div class="bg-amber-50 border border-amber-100 rounded-2xl p-5 shadow-sm">
              <div class="flex items-start">
                <div class="p-2.5 bg-amber-100/70 rounded-xl mr-4 shrink-0">
                  <span class="material-symbols-outlined text-amber-600">lightbulb</span>
                </div>
                <div>
                  <p class="text-sm font-bold text-amber-900">생산성 팁</p>
                  <p class="text-xs text-amber-800/80 leading-relaxed mt-1.5 font-medium">
                    집중이 필요한 할 일에는 뽀모도로 기법을 써 보세요. 25분 집중하고 5분 쉬기를 반복하면 효율이 올라갑니다.
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Mobile sidebar overlay -->
    <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-slate-900/40 z-20 lg:hidden" aria-hidden="true"></div>

    <!-- Modal -->
    <div
      id="todo-modal"
      class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm px-4"
    >
      <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center">
          <h2 id="modal-title" class="text-lg font-bold text-slate-800">새로운 할 일</h2>
          <button
            type="button"
            id="close-modal-btn"
            class="text-slate-400 hover:text-slate-600 hover:bg-slate-50 p-1.5 rounded-lg transition-colors"
          >
            <span class="material-symbols-outlined text-[20px]">close</span>
          </button>
        </div>

        <form id="todo-form">
          <div class="p-6 space-y-5 max-h-[75vh] overflow-y-auto">
            <div class="space-y-1.5">
              <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" for="input-title">제목</label>
              <input
                type="text"
                id="input-title"
                placeholder="무엇을 해야 하나요?"
                class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-slate-900 placeholder:text-slate-400 font-medium"
                required
              />
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" for="input-start-date"
                  >시작일</label
                >
                <input
                  type="date"
                  id="input-start-date"
                  class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-slate-700 text-sm"
                  required
                />
              </div>
              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" for="input-end-date"
                  >종료일</label
                >
                <input
                  type="date"
                  id="input-end-date"
                  class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-slate-700 text-sm"
                />
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" for="input-start-time"
                  >시작 시간</label
                >
                <input
                  type="time"
                  id="input-start-time"
                  class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-slate-700 text-sm"
                />
              </div>
              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" for="input-end-time"
                  >종료 시간</label
                >
                <input
                  type="time"
                  id="input-end-time"
                  class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-slate-700 text-sm"
                />
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" for="input-priority"
                  >우선순위</label
                >
                <select
                  id="input-priority"
                  class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-slate-700 text-sm bg-white"
                >
                  <option value="low">낮음 (Low)</option>
                  <option value="medium" selected>보통 (Medium)</option>
                  <option value="high">높음 (High)</option>
                </select>
              </div>
              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" for="input-category"
                  >프로젝트</label
                >
                <select
                  id="input-category"
                  class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-slate-700 text-sm bg-white"
                >
                  <option value="personal" selected>개인</option>
                  <option value="work">업무</option>
                  <option value="study">공부</option>
                  <option value="other">기타</option>
                </select>
              </div>
            </div>

            <div class="space-y-1.5">
              <label class="text-xs font-bold text-slate-500 uppercase tracking-wider" for="input-memo">상세 내용</label>
              <textarea
                id="input-memo"
                placeholder="추가적인 메모나 상세 내용을 입력하세요..."
                rows="3"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-slate-700 text-sm resize-none"
              ></textarea>
            </div>
          </div>

          <div class="px-6 py-4 bg-slate-50 flex justify-end gap-3 border-t border-slate-100">
            <button
              type="button"
              id="cancel-modal-btn"
              class="px-5 py-2 rounded-lg font-medium text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 transition-colors text-sm"
            >
              취소
            </button>
            <button
              type="submit"
              class="px-5 py-2 rounded-lg font-medium text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-200 text-sm flex items-center gap-2"
            >
              <span class="material-symbols-outlined text-[16px]">check</span>
              저장
            </button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
  </body>
</html>
